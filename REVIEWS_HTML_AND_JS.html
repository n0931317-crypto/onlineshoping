<!-- JavaScript for Reviews Functionality -->
<script>
let currentProductId = null;
let selectedRating = 0;

// Initialize reviews section
function initializeReviews(productId) {
    currentProductId = productId;
    loadReviews();
    loadReviewStats();
}

// Toggle review form visibility
function toggleReviewForm() {
    const form = document.getElementById('reviewForm');
    form.classList.toggle('active');
    
    if (form.classList.contains('active')) {
        // Scroll to form
        form.scrollIntoView({ behavior: 'smooth', block: 'center' });
        document.getElementById('customerName').focus();
    } else {
        // Reset form
        document.getElementById('reviewFormElement').reset();
        selectedRating = 0;
        updateStarDisplay();
    }
}

// Handle star rating selection
document.addEventListener('DOMContentLoaded', function() {
    const stars = document.querySelectorAll('.star-rating .star');
    stars.forEach(star => {
        star.addEventListener('click', function() {
            selectedRating = this.dataset.rating;
            document.getElementById('reviewRating').value = selectedRating;
            updateStarDisplay();
        });

        star.addEventListener('mouseover', function() {
            const hoverRating = this.dataset.rating;
            stars.forEach(s => {
                s.style.color = s.dataset.rating >= hoverRating ? '#ffc107' : '#ddd';
            });
        });
    });

    document.getElementById('starRating').addEventListener('mouseout', updateStarDisplay);
});

function updateStarDisplay() {
    const stars = document.querySelectorAll('.star-rating .star');
    stars.forEach(star => {
        star.classList.remove('selected');
        if (selectedRating && star.dataset.rating >= selectedRating) {
            star.style.color = '#ffc107';
            if (star.dataset.rating == selectedRating) {
                star.classList.add('selected');
            }
        } else {
            star.style.color = selectedRating && star.dataset.rating > selectedRating ? '#ddd' : '#ffc107';
        }
    });
}

// Load and display reviews
async function loadReviews() {
    if (!currentProductId) return;

    const reviewsList = document.getElementById('reviewsList');
    reviewsList.innerHTML = '<div class="loading">Loading reviews</div>';

    try {
        const reviews = await fetchProductReviews(currentProductId);

        if (reviews.length === 0) {
            reviewsList.innerHTML = '<div class="no-reviews"><p>No reviews yet. Be the first to review!</p></div>';
            return;
        }

        reviewsList.innerHTML = reviews.map(review => `
            <div class="review-item">
                <div class="review-header">
                    <div>
                        <div class="review-customer">${escapeHtml(review.customer_name)}</div>
                        <div class="review-date">${new Date(review.created_at).toLocaleDateString()}</div>
                    </div>
                </div>
                
                <div class="review-rating">
                    ${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}
                </div>

                ${review.is_verified_purchase ? '<div class="review-verified">✓ Verified Purchase</div>' : ''}

                <div class="review-title">${escapeHtml(review.review_title)}</div>
                <div class="review-text">${escapeHtml(review.review_text)}</div>

                <div class="review-actions">
                    <button class="helpful-btn" onclick="markHelpful('${review.id}')">
                        👍 Helpful (${review.helpful_count || 0})
                    </button>
                </div>
            </div>
        `).join('');
    } catch (error) {
        console.error('Error loading reviews:', error);
        reviewsList.innerHTML = '<div class="no-reviews"><p>Error loading reviews. Please try again.</p></div>';
    }
}

// Load and display review statistics
async function loadReviewStats() {
    if (!currentProductId) return;

    try {
        const stats = await getProductReviewStats(currentProductId);

        if (!stats || stats.totalReviews === 0) {
            document.getElementById('ratingSummary').style.display = 'none';
            return;
        }

        document.getElementById('ratingSummary').style.display = 'flex';
        document.getElementById('averageRating').textContent = stats.averageRating.toFixed(1);
        document.getElementById('averageStars').textContent = '★'.repeat(Math.round(stats.averageRating)) + '☆'.repeat(5 - Math.round(stats.averageRating));
        document.getElementById('reviewCount').textContent = `${stats.totalReviews} review${stats.totalReviews !== 1 ? 's' : ''}`;

        // Update rating breakdown
        for (let i = 5; i >= 1; i--) {
            const count = stats.ratingBreakdown[i];
            const percentage = stats.totalReviews > 0 ? (count / stats.totalReviews) * 100 : 0;
            document.getElementById(`count${i}`).textContent = count;
            document.getElementById(`bar${i}`).style.width = percentage + '%';
        }
    } catch (error) {
        console.error('Error loading review stats:', error);
    }
}

// Submit review form
async function submitReviewHandler(event) {
    event.preventDefault();

    if (!selectedRating) {
        showNotification('Please select a rating', 'error');
        return;
    }

    if (!currentProductId) {
        showNotification('Product ID not loaded. Please reload the page.', 'error');
        console.error('currentProductId is null. Make sure initializeReviews(productId) was called.');
        return;
    }

    const submitBtn = document.getElementById('submitReviewBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';

    try {
        const reviewData = {
            product_id: currentProductId,
            customer_name: document.getElementById('customerName').value,
            customer_email: document.getElementById('customerEmail').value,
            rating: selectedRating,
            review_title: document.getElementById('reviewTitle').value,
            review_text: document.getElementById('reviewText').value,
            is_verified_purchase: document.getElementById('verifiedPurchase').checked
        };

        console.log('Submitting review:', reviewData);

        const result = await submitReview(reviewData);

        if (result.success) {
            showNotification(result.message, 'success');
            document.getElementById('reviewFormElement').reset();
            selectedRating = 0;
            updateStarDisplay();
            toggleReviewForm();
            loadReviews();
            loadReviewStats();
        } else {
            showNotification(result.message, 'error');
        }
    } catch (error) {
        console.error('Error submitting review:', error);
        showNotification('Error submitting review: ' + error.message, 'error');
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Review';
    }
}

// Mark review as helpful
async function markHelpful(reviewId) {
    try {
        const result = await markReviewHelpful(reviewId, 'anonymous-user@example.com');
        
        if (result.success) {
            showNotification(result.message, 'success');
            loadReviews(); // Reload to show updated helpful count
        } else {
            showNotification(result.message, 'info');
        }
    } catch (error) {
        console.error('Error marking helpful:', error);
    }
}

// Utility: Escape HTML to prevent XSS
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Utility: Show notification (use your existing notification function or this simple one)
function showNotification(message, type = 'info') {
    const notification = document.createElement('div');
    notification.textContent = message;
    notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 20px;
        border-radius: 8px;
        background-color: ${type === 'success' ? '#d4edda' : type === 'error' ? '#f8d7da' : '#d1ecf1'};
        color: ${type === 'success' ? '#155724' : type === 'error' ? '#721c24' : '#0c5460'};
        z-index: 10000;
        animation: slideIn 0.3s ease;
    `;
    document.body.appendChild(notification);
    setTimeout(() => notification.remove(), 3000);
}
</script>

<script src="supabase-new.js"></script>

<script>
// Auto-initialize reviews section when page loads
// In production, this should be called from product-details.html with the actual product ID
document.addEventListener('DOMContentLoaded', function() {
    // Check if productId is passed via URL parameter or data attribute
    const urlParams = new URLSearchParams(window.location.search);
    const productIdParam = urlParams.get('productId');
    
    if (productIdParam) {
        // Use product ID from URL parameter
        initializeReviews(parseInt(productIdParam));
        console.log('✅ Reviews initialized with product ID:', productIdParam);
    } else if (document.body.dataset.productId) {
        // Use product ID from data attribute
        initializeReviews(parseInt(document.body.dataset.productId));
        console.log('✅ Reviews initialized with product ID:', document.body.dataset.productId);
    } else {
        // Fallback: Use first product ID for testing
        // In production, this should be set properly from your product page
        console.warn('⚠️ No product ID found. Using product ID 1 for testing.');
        console.log('To set product ID, either:');
        console.log('1. Add ?productId=123 to the URL');
        console.log('2. Add data-product-id="123" to the body tag');
        console.log('3. Call initializeReviews(123) directly');
        
        // For testing, try to initialize with first product
        initializeReviews(1);
    }
});

// Wait for Supabase library and supabase-new.js to be ready
function waitForSupabase() {
    if (window.supabase && window.supabaseClient) {
        console.log('✅ Supabase ready, can now submit reviews');
        return true;
    }
    if (window.supabase && !window.supabaseClient) {
        // Trigger initialization
        if (typeof initializeSupabase === 'function') {
            console.log('⏳ Initializing Supabase...');
            initializeSupabase();
            return true;
        }
    }
    return false;
}

// Check every 100ms until Supabase is ready (max 10 seconds)
let attempts = 0;
const checkInterval = setInterval(() => {
    attempts++;
    if (waitForSupabase()) {
        clearInterval(checkInterval);
        console.log('✅ Supabase initialization complete after ' + attempts + ' attempts');
    } else if (attempts > 100) {
        clearInterval(checkInterval);
        console.error('❌ Failed to initialize Supabase after 10 seconds');
        console.error('window.supabase:', typeof window.supabase);
        console.error('window.supabaseClient:', typeof window.supabaseClient);
        console.error('initializeSupabase function:', typeof initializeSupabase);
    }
}, 100);
</script>
